{% extends 'base.html' %}

{% block title %}Doctors{% endblock %}

{% block content %}

<div class="doctors-page">

    <!-- 🔍 Filter Section -->
    <div class="filter-bar">
        <form method="GET">
            <input type="text" name="search" placeholder="Search doctor..." value="{{ request.args.get('search','') }}">

            <select name="specialization">
                <option value="">All Specializations</option>
                {% for spec in specializations %}
                    <option value="{{ spec }}" 
                        {% if request.args.get('specialization') == spec %}selected{% endif %}>
                        {{ spec }}
                    </option>
                {% endfor %}
            </select>

            <button type="submit">Filter</button>
        </form>
    </div>

    <!-- 🧑‍⚕️ Doctors Grid -->
    <div class="doctors-container">

        {% for doctor in doctors %}
        <div class="doctor-card">
            <img src="{{ doctor.img_url }}" alt="Doctor">

            <h3>{{ doctor.name }}</h3>
            <p class="spec">{{ doctor.specialization }}</p>

            <div class="card-buttons">
                <a href="/patient/doctor_details?id={{ doctor.id }}" class="btn about">About</a>
                <a href="/patient/book_appointment?id={{ doctor.id }}" class="btn appoint">Appointment</a>
            </div>
        </div>
        {% else %}
            <p>No doctors found.</p>
        {% endfor %}

    </div>

</div>
<style>
    /* Doctors Page */

.doctors-page {
    padding: 30px;
}

/* Filter Bar */
.filter-bar {
    margin-bottom: 25px;
    text-align: center;
}

.filter-bar form {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
}

.filter-bar input,
.filter-bar select {
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
}

.filter-bar button {
    padding: 10px 15px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.filter-bar button:hover {
    background: #388e3c;
}

/* Doctors Grid */
.doctors-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
}

/* Card */
.doctor-card {
    background: #fff;
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.doctor-card:hover {
    transform: translateY(-5px);
}

.doctor-card img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 10px;
}

.doctor-card h3 {
    margin: 10px 0 5px;
}

.spec {
    color: #777;
    font-size: 14px;
    margin-bottom: 15px;
}

/* Buttons */
.card-buttons {
    display: flex;
    justify-content: center;
    gap: 10px;
}

.btn {
    padding: 8px 12px;
    border-radius: 6px;
    text-decoration: none;
    color: white;
    font-size: 14px;
}

.about {
    background: #2196F3;
}

.about:hover {
    background: #1976d2;
}

.appoint {
    background: #4CAF50;
}

.appoint:hover {
    background: #388e3c;
}
</style>
{% endblock %}
