<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<style>body { background-color: #f0f8fb; }</style>
<div class="container mt-5" style="max-width: 400px;">
    <div class="card shadow p-4 border-0 rounded-4">
        <h2 class="text-center mb-4 text-primary">Doctor Login</h2>
        {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
        <form method="post">
            <div class="mb-3"><input type="email" name="email" class="form-control p-3" placeholder="Email ID" required></div>
            <div class="mb-4"><input type="password" name="password" class="form-control p-3" placeholder="Password" required></div>
            <button class="btn btn-primary w-100 p-2 fs-5">Login</button>
        </form>
    </div>
</div>
