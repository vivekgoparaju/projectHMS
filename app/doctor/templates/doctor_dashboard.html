<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<style>body { background-color: #f0f8fb; }</style>
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary">Doctor Dashboard</h2>
        <div>
            <span class="me-3 fw-bold">Dr. {{ session['doctor_name'] }}</span>
            <a href="{{ url_for('doctor.patients') }}" class="btn btn-outline-info me-2">My Patients</a>
            <a href="{{ url_for('doctor.logout') }}" class="btn btn-outline-danger">Logout</a>
        </div>
    </div>
    
    <div class="card shadow-sm p-4 border-0">
        <h4 class="mb-3">Upcoming Appointments</h4>
        <table class="table table-hover align-middle">
            <thead class="table-primary">
                <tr><th>Date</th><th>Time</th><th>Patient</th><th>Status</th><th>Action</th></tr>
            </thead>
            <tbody>
            {% for a in appointments %}
            <tr>
                <td>{{ a.date }}</td><td>{{ a.time }}</td>
                <td>{{ a.patient_name }}</td>
                <td><span class="badge bg-{{ 'warning' if a.status=='pending' else 'success' if a.status=='confirmed' else 'secondary' }} fs-6">{{ a.status }}</span></td>
                <td>
                    <form method="post" action="{{ url_for('doctor.update_status', id=a.id) }}" class="d-flex gap-2">
                        <select name="status" class="form-select form-select-sm" style="width: auto;">
                            <option value="pending" {% if a.status=='pending' %}selected{% endif %}>Pending</option>
                            <option value="confirmed" {% if a.status=='confirmed' %}selected{% endif %}>Confirmed</option>
                            <option value="completed" {% if a.status=='completed' %}selected{% endif %}>Completed</option>
                        </select>
                        <button class="btn btn-primary btn-sm">Update</button>
                        <a href="{{ url_for('doctor.history', patient_id=a.patient_id) }}" class="btn btn-success btn-sm">Medical Profile</a>
                    </form>
                </td>
            </tr>
            {% else %}
            <tr><td colspan="5" class="text-center py-4">No upcoming appointments.</td></tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</div>
