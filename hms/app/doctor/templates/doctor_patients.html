<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<style>body { background-color: #f0f8fb; }</style>
<div class="container mt-5">
    <div class="d-flex justify-content-between mb-4">
        <h2 class="text-primary">My Patients</h2>
        <a href="{{ url_for('doctor.dashboard') }}" class="btn btn-secondary">Back to Dashboard</a>
    </div>
    
    <div class="row">
        {% for p in patients %}
        <div class="col-md-4 mb-4">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h5 class="card-title">{{ p.username }}</h5>
                    <p class="card-text text-muted mb-1">Email: {{ p.email }}</p>
                    <p class="card-text text-muted mb-3">Phone: {{ p.phone }}</p>
                    <a href="{{ url_for('doctor.history', patient_id=p.id) }}" class="btn btn-outline-primary btn-sm w-100">View Medical History</a>
                </div>
            </div>
        </div>
        {% else %}
        <div class="col-12"><div class="alert alert-info">No patients found.</div></div>
        {% endfor %}
    </div>
</div>
