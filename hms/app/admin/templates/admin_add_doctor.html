<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<style>body { background-color: #f8f9fa; }</style>
<div class="container mt-5" style="max-width: 600px;">
    <div class="card shadow-sm p-4">
        <h2 class="mb-4">Add New Doctor</h2>
        <form method="post">
            <input type="text" name="name" class="form-control mb-3" placeholder="Full Name" required>
            <input type="email" name="email" class="form-control mb-3" placeholder="Email Address" required>
            <input type="password" name="password" class="form-control mb-3" placeholder="Temporary Password" required>
            <input type="text" name="specialization" class="form-control mb-3" placeholder="Specialization (e.g. Cardiologist)">
            <input type="text" name="phone" class="form-control mb-4" placeholder="Phone Number">
            <button class="btn btn-success w-100">Add Doctor</button>
            <a href="{{ url_for('admin.dashboard') }}" class="btn btn-link mt-2 d-block text-center text-decoration-none">Back to Dashboard</a>
        </form>
    </div>
</div>
